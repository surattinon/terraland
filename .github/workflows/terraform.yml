name: 'Terraform ALZ Sandbox Pipeline'
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  ARM_SUBSCRIPTION_ID: ${{secrets.ARM_SUBSCRIPTION_ID}}
  ARM_CLIENT_ID: ${{secrets.ARM_CLIENT_ID}}
  ARM_CLIENT_SECRET: ${{secrets.ARM_CLIENT_SECRET}}
  ARM_TENANT_ID: ${{secrets.ARM_TENANT_ID}}
  WORKDIR: 'environments/sandbox'

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{env.WORKDIR}}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Terraform Setup
      uses: hashicorp/setup-terraform@v4

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -no-color -out=tfplan > plan_output.txt

    - name: Post Plan to Github PR
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const planOutput = fs.readFileSync('${{env.WORKDIR}}/plan_output.txt', 'utf8');
          const comment = `### Terraform Plan Result\n\`\`\`terraform\n${planOutput}\n\`\`\``;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          })

  apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: plan

    # Only run this job if the code was actually pushed/merged into the 'main' branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    defaults:
      run:
        working-directory: ${{env.WORKDIR}}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Terraform Setup
      uses: hashicorp/setup-terraform@v4

    - name: Terraform Init
      run: terraform init
    
    - name: Terraform Apply
      run: terraform apply -auto-approve